<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 640 340" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="640" height="340" fill="#fafaf8" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">キク科（Asteraceae）── これ、全部仲間です</text>

  <!-- Grid: 4 columns x 2 rows -->
  <!-- Row 1 -->
  <g transform="translate(16,42)">
    <clipPath id="c1"><rect width="144" height="120" rx="8"/></clipPath>
    <image href="https://commons.wikimedia.org/wiki/Special:FilePath/Taraxacum_officinale_flowers.jpg" width="144" height="120" preserveAspectRatio="xMidYMid slice" clip-path="url(#c1)"/>
    <rect width="144" height="120" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect y="96" width="144" height="24" rx="0" fill="rgba(0,0,0,0.55)"/>
    <text x="72" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">タンポポ</text>
  </g>

  <g transform="translate(168,42)">
    <clipPath id="c2"><rect width="144" height="120" rx="8"/></clipPath>
    <image href="https://commons.wikimedia.org/wiki/Special:FilePath/Sunflower_from_Silesia2.jpg" width="144" height="120" preserveAspectRatio="xMidYMid slice" clip-path="url(#c2)"/>
    <rect width="144" height="120" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect y="96" width="144" height="24" rx="0" fill="rgba(0,0,0,0.55)"/>
    <text x="72" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ヒマワリ</text>
  </g>

  <g transform="translate(320,42)">
    <clipPath id="c3"><rect width="144" height="120" rx="8"/></clipPath>
    <image href="https://commons.wikimedia.org/wiki/Special:FilePath/Chrysanthemum_November_2007_Osaka_Japan.jpg" width="144" height="120" preserveAspectRatio="xMidYMid slice" clip-path="url(#c3)"/>
    <rect width="144" height="120" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect y="96" width="144" height="24" rx="0" fill="rgba(0,0,0,0.55)"/>
    <text x="72" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">キク</text>
  </g>

  <g transform="translate(472,42)">
    <clipPath id="c4"><rect width="144" height="120" rx="8"/></clipPath>
    <image href="https://commons.wikimedia.org/wiki/Special:FilePath/Cosmos_bipinnatus_close-up.jpg" width="144" height="120" preserveAspectRatio="xMidYMid slice" clip-path="url(#c4)"/>
    <rect width="144" height="120" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect y="96" width="144" height="24" rx="0" fill="rgba(0,0,0,0.55)"/>
    <text x="72" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">コスモス</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(16,172)">
    <clipPath id="c5"><rect width="144" height="120" rx="8"/></clipPath>
    <image href="https://commons.wikimedia.org/wiki/Special:FilePath/Leucanthemum_vulgare_%27Filigran%27_Flower_2200px.jpg" width="144" height="120" preserveAspectRatio="xMidYMid slice" clip-path="url(#c5)"/>
    <rect width="144" height="120" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect y="96" width="144" height="24" rx="0" fill="rgba(0,0,0,0.55)"/>
    <text x="72" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ヒナギク</text>
  </g>

  <g transform="translate(168,172)">
    <clipPath id="c6"><rect width="144" height="120" rx="8"/></clipPath>
    <image href="https://commons.wikimedia.org/wiki/Special:FilePath/Arctium_lappa_-_burdock_-_gobou.jpg" width="144" height="120" preserveAspectRatio="xMidYMid slice" clip-path="url(#c6)"/>
    <rect width="144" height="120" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect y="96" width="144" height="24" rx="0" fill="rgba(0,0,0,0.55)"/>
    <text x="72" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ゴボウ</text>
  </g>

  <g transform="translate(320,172)">
    <clipPath id="c7"><rect width="144" height="120" rx="8"/></clipPath>
    <image href="https://commons.wikimedia.org/wiki/Special:FilePath/Lactuca_sativa_Butterhead_lettuce.jpg" width="144" height="120" preserveAspectRatio="xMidYMid slice" clip-path="url(#c7)"/>
    <rect width="144" height="120" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect y="96" width="144" height="24" rx="0" fill="rgba(0,0,0,0.55)"/>
    <text x="72" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">レタス</text>
  </g>

  <g transform="translate(472,172)">
    <clipPath id="c8"><rect width="144" height="120" rx="8"/></clipPath>
    <image href="https://commons.wikimedia.org/wiki/Special:FilePath/Cirsium_vulgare_-_Speerdistel.jpg" width="144" height="120" preserveAspectRatio="xMidYMid slice" clip-path="url(#c8)"/>
    <rect width="144" height="120" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    <rect y="96" width="144" height="24" rx="0" fill="rgba(0,0,0,0.55)"/>
    <text x="72" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">アザミ</text>
  </g>

  <!-- Bottom label -->
  <rect x="140" y="304" width="360" height="26" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="320" y="322" text-anchor="middle" font-size="11" fill="#92400e">すべてキク科 ── 見た目はバラバラでも、頭状花序という共通の武器を持つ</text>
</svg>
