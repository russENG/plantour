<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="600" height="400" fill="#fafaf8" rx="12"/>
  <text x="300" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">有性生殖 vs アポミクシス（無融合生殖）</text>

  <!-- Left: Sexual reproduction -->
  <g transform="translate(20,50)">
    <rect width="260" height="330" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="130" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">有性生殖（在来タンポポ）</text>

    <!-- Pollen -->
    <circle cx="70" cy="72" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="70" y="68" text-anchor="middle" font-size="10" fill="#92400e">花粉</text>
    <text x="70" y="80" text-anchor="middle" font-size="9" fill="#92400e">(n=8)</text>

    <!-- Plus sign -->
    <text x="130" y="78" text-anchor="middle" font-size="22" fill="#6b7280">+</text>

    <!-- Egg -->
    <circle cx="190" cy="72" r="22" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
    <text x="190" y="68" text-anchor="middle" font-size="10" fill="#9d174d">卵</text>
    <text x="190" y="80" text-anchor="middle" font-size="9" fill="#9d174d">(n=8)</text>

    <!-- Arrow down -->
    <line x1="130" y1="100" x2="130" y2="138" stroke="#374151" stroke-width="2" marker-end="url(#arrowD)"/>
    <text x="172" y="125" font-size="10" fill="#6b7280">受粉</text>

    <!-- Seed -->
    <ellipse cx="130" cy="162" rx="28" ry="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="130" y="158" text-anchor="middle" font-size="10" fill="#166534">種子</text>
    <text x="130" y="170" text-anchor="middle" font-size="9" fill="#166534">(2n=16)</text>

    <!-- Arrow down -->
    <line x1="130" y1="185" x2="130" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arrowD)"/>

    <!-- Diverse offspring -->
    <g transform="translate(50,218)">
      <circle cx="0" cy="20" r="14" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
      <circle cx="40" cy="15" r="14" fill="#6ee7b7" stroke="#16a34a" stroke-width="1"/>
      <circle cx="80" cy="22" r="14" fill="#a7f3d0" stroke="#16a34a" stroke-width="1"/>
      <circle cx="120" cy="18" r="14" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
      <circle cx="160" cy="20" r="14" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
    </g>
    <text x="130" y="270" text-anchor="middle" font-size="11" fill="#166534">↑ それぞれ遺伝子が違う</text>
    <text x="130" y="286" text-anchor="middle" font-size="10" fill="#6b7280">（多様性がある）</text>

    <!-- Season -->
    <rect x="40" y="298" width="180" height="22" rx="6" fill="#fef3c7"/>
    <text x="130" y="314" text-anchor="middle" font-size="10" fill="#92400e">🌸 春にだけ咲く（相手が必要）</text>
  </g>

  <!-- Right: Apomixis -->
  <g transform="translate(320,50)">
    <rect width="260" height="330" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="130" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">アポミクシス（セイヨウタンポポ）</text>

    <!-- Mother cell only -->
    <circle cx="130" cy="72" r="28" fill="#fecdd3" stroke="#e11d48" stroke-width="1.5"/>
    <text x="130" y="66" text-anchor="middle" font-size="10" fill="#9f1239">母の細胞</text>
    <text x="130" y="80" text-anchor="middle" font-size="9" fill="#9f1239">(3n=24)</text>

    <!-- No pollen -->
    <text x="40" y="78" text-anchor="middle" font-size="10" fill="#dc2626">花粉不要!</text>
    <line x1="15" y1="60" x2="65" y2="90" stroke="#dc2626" stroke-width="2"/>
    <line x1="65" y1="60" x2="15" y2="90" stroke="#dc2626" stroke-width="2"/>

    <!-- Arrow down -->
    <line x1="130" y1="106" x2="130" y2="138" stroke="#374151" stroke-width="2" marker-end="url(#arrowD)"/>
    <text x="172" y="125" font-size="10" fill="#6b7280">そのまま</text>

    <!-- Seed -->
    <ellipse cx="130" cy="162" rx="28" ry="18" fill="#fecdd3" stroke="#e11d48" stroke-width="1.5"/>
    <text x="130" y="158" text-anchor="middle" font-size="10" fill="#9f1239">種子</text>
    <text x="130" y="170" text-anchor="middle" font-size="9" fill="#9f1239">(3n=24)</text>

    <!-- Arrow down -->
    <line x1="130" y1="185" x2="130" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arrowD)"/>

    <!-- Clone offspring - all same -->
    <g transform="translate(50,218)">
      <circle cx="0" cy="20" r="14" fill="#fca5a5" stroke="#e11d48" stroke-width="1"/>
      <circle cx="40" cy="20" r="14" fill="#fca5a5" stroke="#e11d48" stroke-width="1"/>
      <circle cx="80" cy="20" r="14" fill="#fca5a5" stroke="#e11d48" stroke-width="1"/>
      <circle cx="120" cy="20" r="14" fill="#fca5a5" stroke="#e11d48" stroke-width="1"/>
      <circle cx="160" cy="20" r="14" fill="#fca5a5" stroke="#e11d48" stroke-width="1"/>
    </g>
    <text x="130" y="270" text-anchor="middle" font-size="11" fill="#991b1b">↑ 全部お母さんのコピー</text>
    <text x="130" y="286" text-anchor="middle" font-size="10" fill="#6b7280">（クローン＝多様性ゼロ）</text>

    <!-- Season -->
    <rect x="40" y="298" width="180" height="22" rx="6" fill="#fef2f2"/>
    <text x="130" y="314" text-anchor="middle" font-size="10" fill="#dc2626">🌼 年中咲ける（相手不要）</text>
  </g>

  <defs>
    <marker id="arrowD" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#374151"/>
    </marker>
  </defs>
</svg>
