<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="600" height="280" fill="#fafaf8" rx="12"/>
  <text x="300" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">倍数性（ばいすうせい）のしくみ</text>

  <!-- 2x diploid -->
  <g transform="translate(30,60)">
    <rect width="240" height="180" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="120" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">2倍体（にばいたい）</text>
    <text x="120" y="46" text-anchor="middle" font-size="11" fill="#6b7280">在来タンポポ・ヒト</text>

    <!-- Father set -->
    <text x="30" y="75" font-size="10" fill="#374151">父から</text>
    <g transform="translate(25,82)">
      <rect width="18" height="50" rx="4" fill="#60a5fa" opacity="0.8"/><rect x="22" width="18" height="42" rx="4" fill="#60a5fa" opacity="0.8"/><rect x="44" width="18" height="56" rx="4" fill="#60a5fa" opacity="0.8"/><rect x="66" width="18" height="38" rx="4" fill="#60a5fa" opacity="0.8"/><rect x="88" width="18" height="48" rx="4" fill="#60a5fa" opacity="0.8"/>
    </g>
    <text x="80" y="152" text-anchor="middle" font-size="10" fill="#2563eb">1セット (n=8)</text>

    <!-- Mother set -->
    <text x="140" y="75" font-size="10" fill="#374151">母から</text>
    <g transform="translate(135,82)">
      <rect width="18" height="50" rx="4" fill="#f472b6" opacity="0.8"/><rect x="22" width="18" height="42" rx="4" fill="#f472b6" opacity="0.8"/><rect x="44" width="18" height="56" rx="4" fill="#f472b6" opacity="0.8"/><rect x="66" width="18" height="38" rx="4" fill="#f472b6" opacity="0.8"/>
    </g>
    <text x="170" y="152" text-anchor="middle" font-size="10" fill="#db2777">1セット (n=8)</text>
    <text x="120" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">計 2セット = 2n = 16本</text>
  </g>

  <!-- 3x triploid -->
  <g transform="translate(310,60)">
    <rect width="260" height="180" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="130" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">3倍体（さんばいたい）</text>
    <text x="130" y="46" text-anchor="middle" font-size="11" fill="#6b7280">セイヨウタンポポ</text>

    <!-- Three sets -->
    <g transform="translate(10,82)">
      <rect width="14" height="46" rx="3" fill="#60a5fa" opacity="0.8"/><rect x="16" width="14" height="38" rx="3" fill="#60a5fa" opacity="0.8"/><rect x="32" width="14" height="52" rx="3" fill="#60a5fa" opacity="0.8"/><rect x="48" width="14" height="34" rx="3" fill="#60a5fa" opacity="0.8"/>
    </g>
    <g transform="translate(80,82)">
      <rect width="14" height="46" rx="3" fill="#f472b6" opacity="0.8"/><rect x="16" width="14" height="38" rx="3" fill="#f472b6" opacity="0.8"/><rect x="32" width="14" height="52" rx="3" fill="#f472b6" opacity="0.8"/><rect x="48" width="14" height="34" rx="3" fill="#f472b6" opacity="0.8"/>
    </g>
    <g transform="translate(150,82)">
      <rect width="14" height="46" rx="3" fill="#a78bfa" opacity="0.8"/><rect x="16" width="14" height="38" rx="3" fill="#a78bfa" opacity="0.8"/><rect x="32" width="14" height="52" rx="3" fill="#a78bfa" opacity="0.8"/><rect x="48" width="14" height="34" rx="3" fill="#a78bfa" opacity="0.8"/>
    </g>
    <text x="40" y="152" text-anchor="middle" font-size="9" fill="#2563eb">Set 1</text>
    <text x="110" y="152" text-anchor="middle" font-size="9" fill="#db2777">Set 2</text>
    <text x="180" y="152" text-anchor="middle" font-size="9" fill="#7c3aed">Set 3</text>

    <text x="130" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">計 3セット = 3n = 24本</text>

    <!-- Warning note -->
    <text x="70" y="64" font-size="9" fill="#dc2626">⚠ 3は割り切れない → 減数分裂が不可</text>
  </g>
</svg>
