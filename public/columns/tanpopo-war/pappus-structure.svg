<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="400" height="360" fill="#fafaf8" rx="12"/>
  <text x="200" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">綿毛（わたげ）= 冠毛（かんもう）の構造</text>

  <!-- Seed body -->
  <g transform="translate(200,260)">
    <!-- Seed (achene) -->
    <ellipse cx="0" cy="0" rx="8" ry="22" fill="#92400e" stroke="#78350f" stroke-width="1"/>
    <text x="40" y="5" font-size="10" fill="#374151">果実（痩果）</text>
    <line x1="12" y1="0" x2="36" y2="0" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Beak -->
    <line x1="0" y1="-22" x2="0" y2="-50" stroke="#a16207" stroke-width="1.5"/>
    <text x="40" y="-35" font-size="10" fill="#374151">嘴（くちばし）</text>
    <line x1="4" y1="-36" x2="36" y2="-36" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Pappus hairs radiating from top -->
    <g stroke="#d4d4d4" stroke-width="0.8" fill="none">
      <line x1="0" y1="-50" x2="0" y2="-180"/>
      <line x1="0" y1="-50" x2="30" y2="-170"/>
      <line x1="0" y1="-50" x2="55" y2="-150"/>
      <line x1="0" y1="-50" x2="72" y2="-120"/>
      <line x1="0" y1="-50" x2="80" y2="-85"/>
      <line x1="0" y1="-50" x2="-30" y2="-170"/>
      <line x1="0" y1="-50" x2="-55" y2="-150"/>
      <line x1="0" y1="-50" x2="-72" y2="-120"/>
      <line x1="0" y1="-50" x2="-80" y2="-85"/>
      <line x1="0" y1="-50" x2="15" y2="-178"/>
      <line x1="0" y1="-50" x2="-15" y2="-178"/>
      <line x1="0" y1="-50" x2="42" y2="-162"/>
      <line x1="0" y1="-50" x2="-42" y2="-162"/>
      <line x1="0" y1="-50" x2="65" y2="-135"/>
      <line x1="0" y1="-50" x2="-65" y2="-135"/>
    </g>

    <!-- Tiny barbs on hairs -->
    <g stroke="#d4d4d4" stroke-width="0.5" fill="none">
      <line x1="-3" y1="-100" x2="3" y2="-105"/><line x1="3" y1="-120" x2="-3" y2="-125"/>
      <line x1="-3" y1="-140" x2="3" y2="-145"/><line x1="3" y1="-160" x2="-3" y2="-165"/>
      <line x1="27" y1="-100" x2="33" y2="-105"/><line x1="50" y1="-100" x2="56" y2="-105"/>
      <line x1="-27" y1="-100" x2="-33" y2="-105"/><line x1="-50" y1="-100" x2="-56" y2="-105"/>
    </g>
  </g>

  <!-- Wind arrow -->
  <g transform="translate(330,120)">
    <text x="0" y="-5" text-anchor="middle" font-size="20" fill="#93c5fd">💨</text>
    <text x="0" y="14" text-anchor="middle" font-size="9" fill="#6b7280">風で飛ぶ</text>
  </g>

  <!-- Annotation: pappus -->
  <rect x="20" y="60" width="140" height="52" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="80" text-anchor="middle" font-size="10" fill="#374151" font-weight="bold">冠毛 = パラシュート</text>
  <text x="90" y="96" text-anchor="middle" font-size="9" fill="#6b7280">がく片が進化したもの</text>
  <text x="90" y="106" text-anchor="middle" font-size="9" fill="#6b7280">数kmも飛べる</text>
  <line x1="160" y1="86" x2="185" y2="105" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Distance note -->
  <rect x="100" y="320" width="200" height="28" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="200" y="339" text-anchor="middle" font-size="11" fill="#1d4ed8">1本のタンポポから数百個の綿毛</text>
</svg>
