<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="600" height="360" fill="#fafaf8" rx="12"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">月別ページビュー: 単発バズ vs 季節の山</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#666">2025年4月〜2026年3月（Wikipedia 日本語版）</text>

  <!-- Plot area: x 70..560 (width 490), y 280..70 (height 210) -->
  <!-- Y grid + labels -->
  <g stroke="#e0ddd4" stroke-width="1">
    <line x1="70" y1="280" x2="560" y2="280"/>
    <line x1="70" y1="227.5" x2="560" y2="227.5" stroke-dasharray="2 3"/>
    <line x1="70" y1="175" x2="560" y2="175" stroke-dasharray="2 3"/>
    <line x1="70" y1="122.5" x2="560" y2="122.5" stroke-dasharray="2 3"/>
    <line x1="70" y1="70" x2="560" y2="70" stroke-dasharray="2 3"/>
  </g>
  <g font-size="10" fill="#888" text-anchor="end">
    <text x="64" y="284">0</text>
    <text x="64" y="231">50k</text>
    <text x="64" y="178">100k</text>
    <text x="64" y="126">150k</text>
    <text x="64" y="73">200k</text>
  </g>
  <text x="20" y="175" font-size="10" fill="#666" text-anchor="middle" transform="rotate(-90 20 175)">月間ページビュー</text>

  <!-- X axis: 12 months (i=0..11 => x=70 + i*44.55) -->
  <line x1="70" y1="280" x2="560" y2="280" stroke="#666" stroke-width="1.2"/>
  <g font-size="9" fill="#666" text-anchor="middle">
    <text x="70" y="296">25/4</text>
    <text x="114.5" y="296">5</text>
    <text x="159.1" y="296">6</text>
    <text x="203.6" y="296">7</text>
    <text x="248.2" y="296">8</text>
    <text x="292.7" y="296">9</text>
    <text x="337.3" y="296">10</text>
    <text x="381.8" y="296">11</text>
    <text x="426.4" y="296">12</text>
    <text x="470.9" y="296">26/1</text>
    <text x="515.5" y="296">2</text>
    <text x="560" y="296">3</text>
  </g>

  <!-- Hogweed line (red): single sharp spike at 202506 -->
  <!-- Y formula: 280 - views * 210 / 200000 = 280 - views/952.4 -->
  <!-- (0,2492):277.4 (1,1439):278.5 (2,185099):85.6 (3,81712):194.2 (4,5500):274.2 (5,2163):277.7 (6,1870):278.0 (7,1503):278.4 (8,6629):273.0 (9,1830):278.1 (10,1426):278.5 (11,1369):278.6 -->
  <polyline fill="none" stroke="#c93a3a" stroke-width="2.2" stroke-linejoin="round"
    points="70,277.4 114.5,278.5 159.1,85.6 203.6,194.2 248.2,274.2 292.7,277.7 337.3,278.0 381.8,278.4 426.4,273.0 470.9,278.1 515.5,278.5 560,278.6"/>
  <g fill="#c93a3a">
    <circle cx="159.1" cy="85.6" r="4"/>
    <circle cx="203.6" cy="194.2" r="3"/>
  </g>

  <!-- Higanbana line (orange-red, autumn equinox): peak Sept-Oct -->
  <!-- (0,10420):269.1 (1,11428):268.0 (2,10735):268.7 (3,11149):268.3 (4,16313):262.9 (5,92160):183.2 (6,54085):223.2 (7,14915):264.3 (8,11790):267.6 (9,9261):270.3 (10,8271):271.3 (11,10508):269.0 -->
  <polyline fill="none" stroke="#e07a3c" stroke-width="2.2" stroke-linejoin="round"
    points="70,269.1 114.5,268.0 159.1,268.7 203.6,268.3 248.2,262.9 292.7,183.2 337.3,223.2 381.8,264.3 426.4,267.6 470.9,270.3 515.5,271.3 560,269.0"/>
  <g fill="#e07a3c">
    <circle cx="292.7" cy="183.2" r="4"/>
  </g>

  <!-- Annotation: hogweed spike -->
  <line x1="159.1" y1="85.6" x2="220" y2="60" stroke="#c93a3a" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="225" y="58" font-size="10" fill="#c93a3a">2025年6月: ニュース報道で急上昇</text>
  <text x="225" y="71" font-size="9" fill="#a83333">（年間総数の63%が1ヶ月に集中）</text>

  <!-- Annotation: higanbana peak -->
  <line x1="292.7" y1="183.2" x2="380" y2="160" stroke="#c47030" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="385" y="158" font-size="10" fill="#c47030">9月: 秋彼岸の風物詩</text>
  <text x="385" y="171" font-size="9" fill="#9c5a25">（毎年同じ時期に山）</text>

  <!-- Legend -->
  <g font-size="11">
    <rect x="80" y="320" width="14" height="3" fill="#c93a3a"/>
    <text x="100" y="325" fill="#1a1a1a">ジャイアント・ホグウィード</text>
    <rect x="280" y="320" width="14" height="3" fill="#e07a3c"/>
    <text x="300" y="325" fill="#1a1a1a">ヒガンバナ</text>
  </g>

  <text x="300" y="350" text-anchor="middle" font-size="9" fill="#888">前者は「news 起点の単発バズ」、後者は「年中行事に伴う毎年の山」</text>
</svg>
