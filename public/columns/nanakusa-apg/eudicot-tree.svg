<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="620" height="400" fill="#fafaf8" rx="12"/>
  <text x="310" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">七草がAPG分類で3大系統を網羅している図</text>

  <!-- Root: Eudicots -->
  <circle cx="80" cy="200" r="6" fill="#374151"/>
  <text x="74" y="230" font-size="11" fill="#374151" font-weight="bold" transform="rotate(-90,74,230)">真正双子葉類</text>

  <!-- Branch lines -->
  <line x1="86" y1="200" x2="160" y2="200" stroke="#374151" stroke-width="2"/>
  <!-- Fork to 3 branches -->
  <line x1="160" y1="200" x2="160" y2="80" stroke="#374151" stroke-width="2"/>
  <line x1="160" y1="200" x2="160" y2="320" stroke="#374151" stroke-width="2"/>

  <!-- Rosids branch (top) -->
  <line x1="160" y1="80" x2="250" y2="80" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="254" y="54" width="340" height="52" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="274" y="74" font-size="13" font-weight="bold" fill="#1d4ed8">バラ類 Rosids</text>
  <text x="274" y="94" font-size="11" fill="#374151">アブラナ科 → ナズナ・カブ・ダイコン</text>
  <!-- Small icons -->
  <circle cx="560" cy="68" r="4" fill="#fbbf24"/><circle cx="572" cy="68" r="4" fill="#fbbf24"/><circle cx="584" cy="68" r="4" fill="#fbbf24"/>

  <!-- Asterids branch (middle) -->
  <line x1="160" y1="200" x2="250" y2="200" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="254" y="144" width="340" height="112" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="274" y="168" font-size="13" font-weight="bold" fill="#166534">キク類 Asterids</text>
  <!-- Asterales sub-branch -->
  <line x1="274" y1="180" x2="290" y2="196" stroke="#166534" stroke-width="1.5"/>
  <text x="296" y="200" font-size="11" fill="#374151">キク目 → キク科 → ハハコグサ・コオニタビラコ</text>
  <!-- Apiales sub-branch -->
  <line x1="274" y1="180" x2="290" y2="230" stroke="#166534" stroke-width="1.5"/>
  <text x="296" y="234" font-size="11" fill="#374151">セリ目 → セリ科 → セリ</text>
  <!-- Small icons -->
  <circle cx="560" cy="196" r="4" fill="#fbbf24"/><circle cx="572" cy="196" r="4" fill="#fbbf24"/>
  <circle cx="560" cy="230" r="4" fill="#fbbf24"/>

  <!-- Caryophyllales branch (bottom) -->
  <line x1="160" y1="320" x2="250" y2="320" stroke="#9333ea" stroke-width="2.5"/>
  <rect x="254" y="294" width="340" height="52" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="274" y="314" font-size="13" font-weight="bold" fill="#7e22ce">ナデシコ目 Caryophyllales</text>
  <text x="274" y="334" font-size="11" fill="#374151">ナデシコ科 → コハコベ（ハコベラ）</text>
  <circle cx="560" cy="314" r="4" fill="#fbbf24"/>

  <!-- Legend -->
  <rect x="20" y="360" width="580" height="28" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="310" y="379" text-anchor="middle" font-size="11" fill="#92400e">🥣 七草がゆ1杯で真正双子葉類の3大系統を全部味わえる</text>

  <!-- Dotted line: "independent lineage" label for Caryophyllales -->
  <text x="200" y="340" text-anchor="middle" font-size="8" fill="#9333ea">※ バラ類でもキク類でもない独立系統</text>
</svg>
